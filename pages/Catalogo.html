<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght,CRSV@100..900,0&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/home.css">
    <title>Catálogo</title>
  </head>
  <body>
    <header>
        <div>
            <img src="/assets/image.png" width="64">
            <h1>Carr{IN}hos</h1>
        </div>
        <nav>
            <ul>
                <li><a href="home.html">Início</a></li>
                <li><a href="Catalogo.html" class="active">Catálogo</a></li>
                <li><a href="Reservas.html">Reservas</a></li>
                <li><a href="Sobre.html">Sobre</a></li>
                <li><a href="Contato.html">Contato</a></li>
            </ul>
        </nav>
        <button><img src="/assets/image.png" width="32">Explorar</button>
    </header>

    <main>
      <p>Catalogo</p>
      <h1>TODOS OS VEÍCULOS</h1>
      <p><span class="quantidade">0</span> veiculos encontrados</p>
      <div class="filtros">
        <input
          class="buscador"
          type="text"
          placeholder="Buscar por nome ou obra..."
        />
        <div class="btns-categories" style="display: flex; flex-direction: row">
          <button class="btn-category" id="">Todos</button>
          <button class="btn-category" id="disponivel">Disponivel</button>
          <button class="btn-category" id="indisponivel">Indisponivel</button>
          <button class="btn-category" id="filme">Filme</button>
          <button class="btn-category" id="série">Série</button>
          <button class="btn-category" id="desenho">Desenho</button>
        </div>
      </div>
      <ul class="list-cars"></ul>
      <div class="pages" style="display: flex; flex-direction: row">
        <button class="page">1</button>
        <button class="page">2</button>
        <button class="page">3</button>
        <button class="page">4</button>
        <button class="page">5</button>
      </div>
    </main>
    <script type="module" src="../scripts/catalogo.js"></script>
  </body>
</html>
